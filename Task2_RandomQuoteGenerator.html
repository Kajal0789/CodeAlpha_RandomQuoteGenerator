<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quotient — Random Quote Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --text: #e8e0d0;
    --muted: #5a5248;
    --accent: #d4a853;
    --accent2: #c47a3a;
  }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .tagline { font-size: 11px; color: var(--muted); letter-spacing: 2px; }

  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    overflow: hidden;
  }

  /* decorative grid lines */
  .stage::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.3;
    pointer-events: none;
  }

  .quote-card {
    position: relative;
    max-width: 680px;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 60px 56px;
    z-index: 1;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .quote-card.fading { opacity: 0; transform: translateY(10px); }

  .open-quote {
    font-family: 'Cormorant Garamond', serif;
    font-size: 100px;
    line-height: 0.7;
    color: var(--accent);
    opacity: 0.6;
    margin-bottom: 8px;
    display: block;
    user-select: none;
  }

  .quote-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-style: italic;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 28px;
  }

  .quote-divider {
    width: 48px;
    height: 1px;
    background: var(--accent);
    margin-bottom: 20px;
  }

  .quote-author {
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .quote-category {
    position: absolute;
    top: 20px;
    right: 24px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 4px 10px;
  }

  .quote-number {
    position: absolute;
    bottom: 20px;
    right: 24px;
    font-size: 10px;
    color: var(--muted);
  }

  .controls {
    z-index: 1;
    margin-top: 40px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    padding: 13px 32px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-101%);
    transition: transform 0.2s ease;
    z-index: -1;
  }
  .btn:hover::before { transform: translateX(0); }
  .btn:hover { color: #0d0d0d; border-color: var(--accent); }
  .btn.primary { border-color: var(--accent); color: var(--accent); }
  .btn.primary:hover { color: #0d0d0d; }

  /* Category filter */
  .filters {
    z-index: 1;
    margin-top: 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .filter-chip {
    padding: 5px 14px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }
  .filter-chip.active { border-color: var(--accent); color: var(--accent); background: rgba(212,168,83,0.08); }
  .filter-chip:hover { color: var(--text); border-color: #444; }

  /* Copy feedback */
  .copy-toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: #0d0d0d;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 28px;
    transition: transform 0.3s ease;
    z-index: 999;
    pointer-events: none;
  }
  .copy-toast.show { transform: translateX(-50%) translateY(0); }

  footer {
    padding: 16px 40px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Quotient</div>
  <div class="tagline">Words that endure</div>
</header>

<div class="stage">
  <div class="quote-card" id="card">
    <span class="open-quote">"</span>
    <div class="quote-text" id="qt"></div>
    <div class="quote-divider"></div>
    <div class="quote-author" id="qa"></div>
    <div class="quote-category" id="qc"></div>
    <div class="quote-number" id="qn"></div>
  </div>

  <div class="controls">
    <button class="btn primary" onclick="newQuote()">New Quote</button>
    <button class="btn" onclick="copyQuote()">Copy</button>
    <button class="btn" onclick="favoriteQuote()">♡ Favourite</button>
  </div>

  <div class="filters">
    <button class="filter-chip active" data-cat="all" onclick="setFilter(this,'all')">All</button>
    <button class="filter-chip" data-cat="wisdom" onclick="setFilter(this,'wisdom')">Wisdom</button>
    <button class="filter-chip" data-cat="motivation" onclick="setFilter(this,'motivation')">Motivation</button>
    <button class="filter-chip" data-cat="science" onclick="setFilter(this,'science')">Science</button>
    <button class="filter-chip" data-cat="life" onclick="setFilter(this,'life')">Life</button>
  </div>
</div>

<div class="copy-toast" id="toast">Copied to clipboard</div>

<footer>
  <span>CodeAlpha Task 2</span>
  <span id="favCount">0 favourites</span>
</footer>

<script>
const quotes = [
  { text: "The only way to do great work is to love what you do.", author: "Steve Jobs", cat: "motivation" },
  { text: "In the middle of every difficulty lies opportunity.", author: "Albert Einstein", cat: "wisdom" },
  { text: "Life is what happens when you're busy making other plans.", author: "John Lennon", cat: "life" },
  { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt", cat: "motivation" },
  { text: "It is not the strongest of the species that survives, nor the most intelligent, but the one most responsive to change.", author: "Charles Darwin", cat: "science" },
  { text: "Two things are infinite: the universe and human stupidity; and I'm not sure about the universe.", author: "Albert Einstein", cat: "science" },
  { text: "To be yourself in a world that is constantly trying to make you something else is the greatest accomplishment.", author: "Ralph Waldo Emerson", cat: "life" },
  { text: "Imagination is more important than knowledge.", author: "Albert Einstein", cat: "science" },
  { text: "The only true wisdom is in knowing you know nothing.", author: "Socrates", cat: "wisdom" },
  { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill", cat: "motivation" },
  { text: "The unexamined life is not worth living.", author: "Socrates", cat: "wisdom" },
  { text: "Happiness is not something ready-made. It comes from your own actions.", author: "Dalai Lama", cat: "life" },
  { text: "Science is organized knowledge. Wisdom is organized life.", author: "Immanuel Kant", cat: "science" },
  { text: "A room without books is like a body without a soul.", author: "Marcus Tullius Cicero", cat: "wisdom" },
  { text: "You only live once, but if you do it right, once is enough.", author: "Mae West", cat: "life" },
  { text: "Be the change you wish to see in the world.", author: "Mahatma Gandhi", cat: "motivation" },
  { text: "An unexamined life is not worth living.", author: "Socrates", cat: "wisdom" },
  { text: "The journey of a thousand miles begins with one step.", author: "Lao Tzu", cat: "wisdom" },
  { text: "Spread love everywhere you go. Let no one ever come to you without leaving happier.", author: "Mother Teresa", cat: "life" },
  { text: "When you reach the end of your rope, tie a knot in it and hang on.", author: "Franklin D. Roosevelt", cat: "motivation" },
];

let filter = 'all';
let lastIndex = -1;
let favourites = [];

function getFiltered() {
  return filter === 'all' ? quotes : quotes.filter(q => q.cat === filter);
}

function newQuote(skipAnim) {
  const pool = getFiltered();
  if (!pool.length) return;
  let idx;
  do { idx = Math.floor(Math.random() * pool.length); } while (idx === lastIndex && pool.length > 1);
  lastIndex = idx;
  const q = pool[idx];

  if (skipAnim) { setCard(q, idx, pool.length); return; }
  const card = document.getElementById('card');
  card.classList.add('fading');
  setTimeout(() => {
    setCard(q, idx, pool.length);
    card.classList.remove('fading');
  }, 300);
}

function setCard(q, idx, total) {
  document.getElementById('qt').textContent = q.text;
  document.getElementById('qa').textContent = q.author;
  document.getElementById('qc').textContent = q.cat;
  document.getElementById('qn').textContent = `${idx + 1} / ${total}`;
}

function setFilter(el, cat) {
  filter = cat;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  lastIndex = -1;
  newQuote(true);
}

function copyQuote() {
  const text = `"${document.getElementById('qt').textContent}" — ${document.getElementById('qa').textContent}`;
  navigator.clipboard.writeText(text).catch(() => {});
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function favoriteQuote() {
  const text = document.getElementById('qt').textContent;
  if (!favourites.includes(text)) {
    favourites.push(text);
    document.getElementById('favCount').textContent = `${favourites.length} favourite${favourites.length !== 1 ? 's' : ''}`;
  }
}

// Keyboard shortcut
document.addEventListener('keydown', e => { if (e.code === 'Space' || e.code === 'ArrowRight') { e.preventDefault(); newQuote(); } });

newQuote(true);
</script>
</body>
</html>
